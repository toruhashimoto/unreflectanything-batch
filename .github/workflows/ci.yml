name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: unit tests (torch-free)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The src.* utility modules import lazily, so the unit tests need only Pillow,
      # numpy and pytest — no torch / unreflectanything / GPU required.
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pillow numpy pytest

      - name: Run unit tests
        run: python -m pytest
